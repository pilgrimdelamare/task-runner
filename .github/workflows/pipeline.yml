name: pipeline

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "full (genera da zero) oppure worker (consuma coda Drive)"
        required: false
        default: "worker"
      count:
        description: "canzoni per genere (solo mode=full)"
        required: false
        default: "1"
      continuous:
        description: "true = re-dispatch al termine finche stop flag assente"
        required: false
        default: "false"
      dry_run:
        description: "true = esegue tutto tranne upload e archivio Drive"
        required: false
        default: "false"

concurrency:
  group: pipeline-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: setup
        run: |
          pip install --quiet google-api-python-client google-auth google-genai gradio-client
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: run
        env:
          DRIVE_ROOT_FOLDER_ID:  ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          DRIVE_CLIENT_ID:       ${{ secrets.DRIVE_CLIENT_ID }}
          DRIVE_CLIENT_SECRET:   ${{ secrets.DRIVE_CLIENT_SECRET }}
          DRIVE_REFRESH_TOKEN:   ${{ secrets.DRIVE_REFRESH_TOKEN }}
          YT_CLIENT_ID:          ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:      ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:      ${{ secrets.YT_REFRESH_TOKEN }}
          ACE_API_KEY:           ${{ secrets.ACE_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          MODELSCOPE_TOKEN:      ${{ secrets.MODELSCOPE_TOKEN }}
          CLOUDFLARE_TOKEN:      ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PIPELINE_MODE:         ${{ github.event.inputs.mode || 'worker' }}
          PIPELINE_COUNT:        ${{ github.event.inputs.count || '1' }}
          PIPELINE_CONTINUOUS:   ${{ github.event.inputs.continuous || 'false' }}
          PIPELINE_DRY_RUN:      ${{ github.event.inputs.dry_run || 'false' }}
          GH_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
        run: python worker.py
